# AlcarisChat デフォルト日本語翻訳ファイル
# プレースホルダー: {0}, {1}, {2} ... は Adventure の translatable args に対応する

chat.proxy.name=Alcaris Network

# {0}: プレイヤー名コンポーネント, {1}: サーバー名コンポーネント
chat.message.connected={0} が {1} に参加しました

# {0}: プレイヤー名コンポーネント, {1}: 元サーバー, {2}: 先サーバー
chat.message.server_switch={0} が {1} から {2} へ移動しました

# {0}: プレイヤー名コンポーネント, {1}: サーバー名コンポーネント
chat.message.disconnect={0} が {1} から退出しました

# {0}: サーバーコンポーネント
chat.command.server.current=現在のサーバー: {0}

# {0}: サーバー一覧コンポーネント
chat.command.server.available=利用可能なサーバー: {0}
