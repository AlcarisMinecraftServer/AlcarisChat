# Send sample players on server list ping
send_players_on_ping: false

# Show all proxy players on tab list
show_global_tab_list: true

# Prefix shown in tab list for players on each server (supports & color codes)
tab_list_prefixes:
  s1: "&a[Lobby]&r "
  s2: "&b[Resource]&r "
  s3: "&c[PvE]&r "
  s4: "&d[Arcade]&r "

# Custom /server command response
custom_server_command: true

# Allow color codes (&) in chat
colorable_chat: true

# Server ID -> display name mapping
server_names:
  s1: "Lobby"
  s2: "Resource"
  s3: "PvE"
  s4: "Arcade"
